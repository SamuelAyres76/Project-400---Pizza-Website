<header class="navbar">
  <div class="nav-inner">
    <!-- centered brand -->
    <div class="brand-center">
      <a routerLink="/" class="logo-link">
        <img src="assets/images/logo.png" alt="Luigi's Pizzeria Logo" class="site-logo" />
      </a>
    </div>

    <!-- menu button on the right (desktop animated menu #25 adapted) -->
    <button class="menu-btn" aria-label="Open menu" (click)="toggleMenu()" [class.open]="isOpen">
      <span class="bars">
        <i></i>
        <i></i>
        <i></i>
      </span>
    </button>

    <button class="theme-btn" [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'" (click)="toggleTheme()">
      {{ isDarkMode ? 'Light' : 'Dark' }}
    </button>
  </div>

  <!-- sliding panel from the right with icon-based navigation -->
  <div class="panel" [class.open]="isOpen">
    <div class="panel-inner">
      <!-- Main Navigation Grid -->
      <div class="nav-grid">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item" (click)="closeMenu()">
          <img src="assets/images/sidebar/home.png" alt="Home" class="nav-icon" />
          <span class="nav-label">Home</span>
        </a>
        <a routerLink="/about" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
          <img src="assets/images/sidebar/about.png" alt="About" class="nav-icon" />
          <span class="nav-label">About</span>
        </a>
        <a routerLink="/browse" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
          <img src="assets/images/sidebar/browse.png" alt="Browse" class="nav-icon" />
          <span class="nav-label">Browse</span>
        </a>
        <a routerLink="/create" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
          <img src="assets/images/sidebar/create.png" alt="Create" class="nav-icon" />
          <span class="nav-label">Create</span>
        </a>
        <a routerLink="/tracker" routerLinkActive="active" class="nav-item single" (click)="closeMenu()">
          <img src="assets/images/sidebar/tracker.png" alt="Tracker" class="nav-icon" />
          <span class="nav-label">Tracker</span>
        </a>
      </div>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Staff Section -->
      <div class="nav-grid">
        <a routerLink="/employee" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
          <img src="assets/images/sidebar/employee.png" alt="Employee" class="nav-icon" />
          <span class="nav-label">Employee</span>
        </a>
      </div>

      <!-- Spacer -->
      <div class="spacer"></div>
    </div>
  </div>
</header>

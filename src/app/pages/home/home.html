<div class="home-container">
  <!-- Pizza Carousel -->
  <div class="carousel-wrapper">
    <div class="carousel-track">
      <div class="carousel-item" *ngFor="let pizza of pizzas">
        <div class="pizza-card" (click)="editPizza(pizza)">
          <h3>{{ pizza.name }}</h3>
          <div class="pizza-visual">
            <app-pizza-visual [toppings]="pizza.toppings" [divisions]="pizza.divisions" [size]="'12'" [uniformSize]="true"></app-pizza-visual>
          </div>
          <p class="description">{{ pizza.description }}</p>
          <p class="price">{{ pizza.currency }}{{ pizza.price.toFixed(2) }}</p>
        </div>
      </div>
      <!-- Duplicate for seamless loop -->
      <div class="carousel-item" *ngFor="let pizza of pizzas">
        <div class="pizza-card" (click)="editPizza(pizza)">
          <h3>{{ pizza.name }}</h3>
          <div class="pizza-visual">
            <app-pizza-visual [toppings]="pizza.toppings" [divisions]="pizza.divisions" [size]="'12'" [uniformSize]="true"></app-pizza-visual>
          </div>
          <p class="description">{{ pizza.description }}</p>
          <p class="price">{{ pizza.currency }}{{ pizza.price.toFixed(2) }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="action-buttons">
    <button class="action-btn create-btn" (click)="navigateToCreate()">
      <img src="assets/images/sidebar/create.png" alt="Create" class="btn-icon">
      <span class="btn-text">Create</span>
    </button>
    <button class="action-btn browse-btn" (click)="navigateToBrowse()">
      <img src="assets/images/sidebar/browse.png" alt="Browse" class="btn-icon">
      <span class="btn-text">Browse</span>
    </button>
  </div>

  <section class="popular-section">
    <h2>Popular Choices</h2>
    <p>Three favourites picked by us!</p>
    <div class="popular-grid">
      <button class="popular-card" *ngFor="let pizza of popularPizzas" (click)="editPizza(pizza)">
        <h3>{{ pizza.name }}</h3>
        <div class="popular-visual">
          <app-pizza-visual [toppings]="pizza.toppings" [divisions]="pizza.divisions" [size]="'12'" [uniformSize]="true"></app-pizza-visual>
        </div>
        <p class="popular-description">{{ pizza.description }}</p>
        <span class="popular-price">{{ pizza.currency }}{{ pizza.price.toFixed(2) }}</span>
      </button>
    </div>
  </section>
</div>
